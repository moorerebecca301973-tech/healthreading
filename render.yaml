services:
  - type: web
    name: medical-monitor-api
    runtime: python
    pythonVersion: 3.12.10
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SEEDED_USERNAME
        value: admin
      - key: SEEDED_PASSWORD
        value: admin123
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: "*"
